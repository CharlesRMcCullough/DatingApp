<nav class="navbar navbar-expand-md navbar-dark fixed-top bg-primary">
    <div class="container">
      <a class="navbar-brand" routerLink="/" routerLinkActive="active">Dating App</a>
        <ul class="navbar-nav mr-auto" >
          <ng-container *ngIf="accountService.currentUser$ | async">
            <li class="nav-item">
              <a class="nav-link" aria-current="page" routerLink="/members" routerLinkActive="active">Matches</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/lists" outerLinkActive="active">Lists</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/messages" outerLinkActive="active">Messages</a>
            </li>
             <li class="nav-item">
              <a class="nav-link" routerLink="/errors" outerLinkActive="active">Errors</a>
            </li>
          </ng-container>
         
        </ul>

        <div class="dropdown" *ngIf="(accountService.currentUser$ | async) as user" dropdown>
          <a class="dropdown-toogle text-light" dropdownToggle>Welcome {{user.username | titlecase}}</a>
          <div class="dropdown-memu mt-3" *dropdownMenu>
              <a class="dropdown-item">Edit Profile</a>
              <div class="dropdown-divider"></div>
              <a class="dropdown-item" (click)="logout()">Logout</a>
          </div>
        </div>

        <form *ngIf="(accountService.currentUser$ | async) === null" #loginForm="ngForm" class="d-flex" (ngSubmit)="login()" autocomplete="off">
          <input
              name="username" 
              [(ngModel)]="model.username"
              class="form-control me-2 r-1" 
              type="text" 
              placeholder="Username">
          <input
              name="password"
              [(ngModel)]="model.password" 
              class="form-control me-2 r-1" 
              type="password" 
              placeholder="Password">
          <button class="btn btn-secondary" type="submit">Login</button>
        </form>
      </div>
    
  </nav>
