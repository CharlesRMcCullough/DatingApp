<nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Dating App</a>
        <ul class="navbar-nav me-auto mb-2 mb-md-0" *ngIf="loggedIn">
          <li class="nav-item">
            <a class="nav-link" aria-current="page" href="#">Matches</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Lists</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Messages</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" (click)="logout()">Logout</a>
          </li>
        </ul>

        <div class="dropdown" *ngIf="loggedIn" dropdown>
          <a class="dropdown-toogle text-light" dropdownToggle>Welecome user</a>
          <div class="dropdown-memu" *dropdownMenu>
              <a class="dropdown item">Edit Profile</a>
              <div class="dropdown-divider"></div>
              <a class="dropdown item" (click)="logout()">Logout</a>
          </div>
        </div>

        <form *ngIf="!loggedIn" #loginForm="ngForm" class="d-flex" (ngSubmit)="login()" autocomplete="off">
          <input
              name="username" 
              [(ngModel)]="model.username"
              class="form-control me-2" 
              type="text" 
              placeholder="Username">
          <input
              name="password"
              [(ngModel)]="model.password" 
              class="form-control me-2" 
              type="password" 
              placeholder="Password">
          <button class="btn btn-outline-success" type="submit">Login</button>
        </form>
      </div>
  </nav>
